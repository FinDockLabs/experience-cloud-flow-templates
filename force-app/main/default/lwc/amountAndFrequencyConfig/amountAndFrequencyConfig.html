<template>
    <div class="cpe-root">
        <!-- ── Frequency ──────────────────────────────────────────────────────── -->
        <section class="cpe-section">
            <button type="button" class="section-header" onclick={handleToggleFrequency}>
                <span class="section-heading">Frequency</span>
                <lightning-icon
                    icon-name={frequencyChevronName}
                    size="xx-small"
                    class="section-chevron"
                ></lightning-icon>
            </button>
            <template lwc:if={frequencyOpen}>
                <p class="section-desc">Choose which giving frequencies donors can pick. At least one is required.</p>

                <div class="slds-form-element">
                    <div class="slds-form-element__control">
                        <label class="slds-checkbox_toggle slds-grid slds-grid_vertical-align-center">
                            <input type="checkbox" checked={showOneTime} onchange={handleShowOneTimeChange} />
                            <span class="slds-checkbox_faux_container">
                                <span class="slds-checkbox_faux"></span>
                            </span>
                            <span class="slds-form-element__label slds-m-bottom_none slds-p-left_small">One-time</span>
                        </label>
                    </div>
                </div>

                <div class="slds-form-element slds-m-top_small">
                    <div class="slds-form-element__control">
                        <label class="slds-checkbox_toggle slds-grid slds-grid_vertical-align-center">
                            <input type="checkbox" checked={showMonthly} onchange={handleShowMonthlyChange} />
                            <span class="slds-checkbox_faux_container">
                                <span class="slds-checkbox_faux"></span>
                            </span>
                            <span class="slds-form-element__label slds-m-bottom_none slds-p-left_small">Monthly</span>
                        </label>
                    </div>
                </div>
                <template lwc:if={frequencyError}>
                    <p class="field-error" role="alert">{frequencyError}</p>
                </template>
                <template lwc:if={showDefaultFrequency}>
                    <lightning-combobox
                        label="Default frequency"
                        value={defaultFrequency}
                        options={frequencyOptions}
                        onchange={handleDefaultFrequencyChange}
                    ></lightning-combobox>
                </template>
            </template>
        </section>

        <hr class="section-rule" />

        <!-- ── Preset Amounts ──────────────────────────────────────────────────── -->
        <section class="cpe-section">
            <h3 class="section-heading">Preset amounts</h3>

            <template lwc:if={showOneTime}>
                <template lwc:if={showBothFrequencies}>
                    <p class="subsection-label">One-time</p>
                </template>
                <div class="amounts-grid">
                    <template for:each={presetsOneTime} for:item="preset">
                        <div key={preset.key} class="amount-cell">
                            <span class="amount-symbol" aria-hidden="true">{presetCurrencySymbol}</span>
                            <input
                                type="number"
                                class="amount-native-input"
                                aria-label={preset.label}
                                placeholder="0"
                                value={preset.amount}
                                min="0"
                                step="any"
                                data-index={preset.index}
                                oninput={handlePresetOTAmountChange}
                            />
                        </div>
                    </template>
                </div>
            </template>

            <template lwc:if={showMonthly}>
                <template lwc:if={showBothFrequencies}>
                    <p class="subsection-label">Monthly</p>
                </template>
                <div class="amounts-grid">
                    <template for:each={presetsRecurring} for:item="preset">
                        <div key={preset.key} class="amount-cell">
                            <span class="amount-symbol" aria-hidden="true">{presetCurrencySymbol}</span>
                            <input
                                type="number"
                                class="amount-native-input"
                                aria-label={preset.label}
                                placeholder="0"
                                value={preset.amount}
                                min="0"
                                step="any"
                                data-index={preset.index}
                                oninput={handlePresetRecAmountChange}
                            />
                        </div>
                    </template>
                </div>
            </template>

        </section>

        <hr class="section-rule" />

        <!-- ── Other Amount ────────────────────────────────────────────────────── -->
        <section class="cpe-section">
            <h3 class="section-heading">Other amount</h3>
            <div class="limit-row">
                <div class="limit-field">
                    <span class="native-label">Minimum</span>
                    <div class="amount-cell">
                        <span class="amount-symbol" aria-hidden="true">{presetCurrencySymbol}</span>
                        <input
                            type="number"
                            class="amount-native-input"
                            aria-label="Minimum amount"
                            value={minAmount}
                            min="0"
                            step="1"
                            oninput={handleMinAmountChange}
                        />
                    </div>
                </div>
                <div class="limit-field">
                    <span class="native-label">Maximum</span>
                    <div class="amount-cell">
                        <span class="amount-symbol" aria-hidden="true">{presetCurrencySymbol}</span>
                        <input
                            type="number"
                            class="amount-native-input"
                            aria-label="Maximum amount"
                            placeholder="No limit"
                            value={maxAmount}
                            min="0"
                            step="1"
                            oninput={handleMaxAmountChange}
                        />
                    </div>
                </div>
            </div>
            <template lwc:if={minMaxError}>
                <p class="field-error" role="alert">{minMaxError}</p>
            </template>
        </section>

    </div>
</template>
